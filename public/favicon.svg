<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Brick base (cardinal red, rounded corners) -->
  <rect x="1" y="1" width="30" height="30" rx="3" fill="#cc0000"/>
  <!-- Edge highlight for depth -->
  <rect x="1" y="1" width="30" height="30" rx="3" fill="none" stroke="#ee3333" stroke-width="1"/>
  <!-- 2x2 stud shadows (darker circle behind each stud) -->
  <circle cx="10" cy="11" r="5.5" fill="#990000"/>
  <circle cx="22" cy="11" r="5.5" fill="#990000"/>
  <circle cx="10" cy="22" r="5.5" fill="#990000"/>
  <circle cx="22" cy="22" r="5.5" fill="#990000"/>
  <!-- 2x2 studs -->
  <circle cx="10" cy="10" r="5.5" fill="#dd1111"/>
  <circle cx="22" cy="10" r="5.5" fill="#dd1111"/>
  <circle cx="10" cy="21" r="5.5" fill="#dd1111"/>
  <circle cx="22" cy="21" r="5.5" fill="#dd1111"/>
  <!-- Stud highlight rings (3-D effect) -->
  <circle cx="10" cy="10" r="4.5" fill="none" stroke="#ff5555" stroke-width="1"/>
  <circle cx="22" cy="10" r="4.5" fill="none" stroke="#ff5555" stroke-width="1"/>
  <circle cx="10" cy="21" r="4.5" fill="none" stroke="#ff5555" stroke-width="1"/>
  <circle cx="22" cy="21" r="4.5" fill="none" stroke="#ff5555" stroke-width="1"/>
</svg>
