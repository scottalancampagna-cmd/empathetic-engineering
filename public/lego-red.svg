<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 18">
  <!-- Stud shadows -->
  <circle cx="8" cy="6.5" r="5" fill="#990000"/>
  <circle cx="22" cy="6.5" r="5" fill="#990000"/>
  <!-- Studs -->
  <circle cx="8" cy="5.5" r="5" fill="#dd2222"/>
  <circle cx="22" cy="5.5" r="5" fill="#dd2222"/>
  <!-- Stud highlight -->
  <circle cx="8" cy="5.5" r="4" fill="none" stroke="#ff5555" stroke-width="0.8"/>
  <circle cx="22" cy="5.5" r="4" fill="none" stroke="#ff5555" stroke-width="0.8"/>
  <!-- Brick body -->
  <rect x="0" y="6" width="30" height="12" fill="#cc0000"/>
  <!-- Top highlight -->
  <rect x="0" y="6" width="30" height="3" fill="#dd1111"/>
  <!-- Bottom shadow -->
  <rect x="0" y="15" width="30" height="3" fill="#990000"/>
</svg>
